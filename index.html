<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1r1shmann</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:auto;
    font-family:system-ui,sans-serif;
    background:#050816;
    color:white;
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.content{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px;
}

.card{
    width:min(900px,100%);
    text-align:center;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:30px;
    padding:50px 30px;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    background:linear-gradient(135deg,#00d4ff,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    font-weight:700;
}

h1{
    margin-top:20px;
    font-size:clamp(2rem,7vw,5rem);
}

.subtitle{
    color:#94a3b8;
    margin-top:15px;
    font-size:1.1rem;
}

.typing{
    color:#00d4ff;
    margin-top:25px;
    font-family:monospace;
    font-size:1.2rem;
}

.links{
    margin-top:40px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    color:white;
    padding:14px 26px;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    transition:.25s;
}

.btn:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.15);
}

/* ===== PROJECTS ===== */

.projects{
    width:min(1000px,100%);
    margin-top:60px;
    padding:20px;
}

.projects h2{
    text-align:center;
    margin-bottom:20px;
    font-size:2rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.project{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    padding:16px;
    transition:.2s;
}

.project:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,.08);
}

.project a{
    color:#00d4ff;
    text-decoration:none;
    font-weight:bold;
}

.desc{
    margin-top:8px;
    font-size:.9rem;
    color:#94a3b8;
}

.meta{
    margin-top:8px;
    font-size:.75rem;
    color:#64748b;
}

/* footer */

.footer{
    margin-top:40px;
    color:#64748b;
    font-size:.9rem;
    text-align:center;
    padding-bottom:40px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="content">

    <!-- HERO -->
    <div class="card">

        <div class="avatar">I</div>

        <h1>1r1shmann</h1>

        <p class="subtitle">
            Backend Developer • PHP • Laravel • PostgreSQL
        </p>

        <div class="typing">
            > building things that actually work_
        </div>

        <div class="links">
            <a class="btn" href="https://github.com/1r1shmann">
                GitHub
            </a>

            <a class="btn" href="mailto:hello@example.com">
                Contact
            </a>
        </div>

    </div>

    <!-- PROJECTS -->
    <div class="projects">
        <h2>My Projects</h2>
        <div class="grid" id="repos"></div>
    </div>

    <div class="footer">
        © 2026 • Hosted on GitHub Pages
    </div>

</div>

<script>
/* ===== GitHub repos ===== */

fetch("https://api.github.com/users/1r1shmann/repos")
.then(r => r.json())
.then(repos => {

    const container = document.getElementById("repos");

    repos
        .filter(r => !r.fork)
        .sort((a,b)=> new Date(b.updated_at)-new Date(a.updated_at))
        .forEach(repo => {

            const div = document.createElement("div");
            div.className = "project";

            div.innerHTML = `
                <a href="https://1r1shmann.github.io/${repo.name}" target="_blank">
                    ${repo.name}
                </a>

                <div class="desc">
                    ${repo.description || "No description"}
                </div>

                <div class="meta">
                    ⭐ ${repo.stargazers_count} • updated ${new Date(repo.updated_at).toLocaleDateString()}
                </div>
            `;

            container.appendChild(div);
        });
});


/* ===== particles (твой код без изменений) ===== */

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

const particles = [];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:(Math.random()-.5)*0.4,
        dy:(Math.random()-.5)*0.4
    });
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width)p.dx*=-1;
        if(p.y<0||p.y>canvas.height)p.dy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(0,212,255,.8)';
        ctx.fill();

    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
